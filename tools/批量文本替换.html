<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量查找与替换工具 v2.3</title>
    <style>
        /* 新增：使用CSS变量定义颜色主题 */
        :root {
            --bg-color: #f4f7f9;
            --text-color: #333;
            --header-color: #2c3e50;
            --textarea-bg: #ffffff;
            --textarea-border: #ccc;
            --textarea-readonly-bg: #e9ecef;
            --button-primary-bg: #3498db;
            --button-primary-hover: #2980b9;
            --button-secondary-bg: #95a5a6;
            --button-secondary-hover: #7f8c8d;
            --stats-text-color: #555;
            --stats-bold-color: #000;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --header-color: #ffffff;
            --textarea-bg: #2a2a2a;
            --textarea-border: #555;
            --textarea-readonly-bg: #222;
            --button-primary-bg: #3498db;
            --button-primary-hover: #5dade2;
            --button-secondary-bg: #566573;
            --button-secondary-hover: #808b96;
            --stats-text-color: #aaa;
            --stats-bold-color: #fff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* 新增：平滑的颜色过渡 */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 新增：主题切换按钮样式 */
        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background-color: var(--textarea-bg);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        #theme-toggle:hover {
            transform: scale(1.1);
        }
        #theme-toggle .icon {
            width: 20px;
            height: 20px;
        }
        #theme-toggle .icon-sun { display: none; }
        body.dark-mode #theme-toggle .icon-sun { display: block; }
        body.dark-mode #theme-toggle .icon-moon { display: none; }


        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: var(--header-color); }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-areas: "list original" "result result"; gap: 20px; }
        .box { display: flex; flex-direction: column; }
        .box#list-box { grid-area: list; }
        .box#original-box { grid-area: original; }
        .box#result-box { grid-area: result; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 1.1em; }
        textarea {
            width: 100%; box-sizing: border-box; border-radius: 5px; padding: 10px; font-size: 14px;
            line-height: 1.5; flex-grow: 1; min-height: 400px; white-space: pre-wrap; word-wrap: break-word;
            background-color: var(--textarea-bg);
            color: var(--text-color);
            border: 1px solid var(--textarea-border);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        #result-text { background-color: var(--textarea-readonly-bg); }
        .controls-container { text-align: center; margin: 20px 0; }
        .stats-container { margin-bottom: 20px; font-size: 1em; color: var(--stats-text-color); }
        .stats-container span { font-weight: bold; color: var(--stats-bold-color); margin: 0 10px; }
        button {
            padding: 12px 25px; font-size: 1.2em; cursor: pointer; border: none;
            border-radius: 5px; transition: background-color 0.3s; margin: 0 10px;
        }
        #replace-button { background-color: var(--button-primary-bg); color: white; }
        #replace-button:hover { background-color: var(--button-primary-hover); }
        #clear-button { background-color: var(--button-secondary-bg); color: white; }
        #clear-button:hover { background-color: var(--button-secondary-hover); }

        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; grid-template-areas: "list" "original" "result"; }
            #theme-toggle { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

    <!-- 新增：主题切换按钮 -->
    <button id="theme-toggle" title="切换亮色/暗色模式">
        <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 11.807A9.002 9.002 0 0 1 10.049 2.5a9.542 9.542 0 0 0-4.434 4.434A9.002 9.002 0 0 1 12 11.807zM12 2.001a10 10 0 1 0 10 10 10 10 0 0 0-10-10z"/></svg>
        <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 18a6 6 0 1 1 6-6 6.007 6.007 0 0 1-6 6zm0-10a4 4 0 1 0 4 4 4.005 4.005 0 0 0-4-4zM12 2a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 18a1 1 0 0 1-1-1v-2a1 1 0 0 1 2 0v2a1 1 0 0 1-1 1zM5.636 6.636a1 1 0 0 1-1.414-1.414l1.414-1.414a1 1 0 0 1 1.414 1.414zM18.364 19.364a1 1 0 0 1-1.414-1.414l1.414-1.414a1 1 0 0 1 1.414 1.414zM22 12a1 1 0 0 1-1-1h-2a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1zm-18 0a1 1 0 0 1-1-1H1a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1zM6.636 18.364a1 1 0 0 1-1.414-1.414l-1.414 1.414a1 1 0 0 1 1.414 1.414zm12.728-1.414a1 1 0 0 1-1.414 1.414l-1.414-1.414a1 1 0 1 1 1.414-1.414z"/></svg>
    </button>
    
    <div class="container">
        <h1>批量查找与替换工具 v2.3</h1>
        <div class="main-grid">
            <div class="box" id="list-box"><label for="word-list">1. 替换词表</label><textarea id="word-list" placeholder="在此处粘贴您的词表，格式如下：&#10;[[查找内容]] ||| [[替换内容]]"></textarea></div>
            <div class="box" id="original-box"><label for="original-text">2. 待处理原文 (可包含HTML)</label><textarea id="original-text" placeholder="在此处粘贴需要处理的原文。"></textarea></div>
            <div class="box" id="result-box"><label for="result-text">3. 替换结果</label><textarea id="result-text" readonly placeholder="替换后的内容将显示在这里。"></textarea></div>
        </div>
        <div class="controls-container">
            <div class="stats-container">词表总行数: <span id="total-lines">0</span> 成功解析的替换项数: <span id="parsed-pairs">0</span></div>
            <button id="replace-button">开始替换</button>
            <button id="clear-button">清空结果</button>
        </div>
    </div>

    <script>
        const replaceButton = document.getElementById('replace-button');
        const clearButton = document.getElementById('clear-button');
        const wordListTextArea = document.getElementById('word-list');
        const themeToggleButton = document.getElementById('theme-toggle');

        replaceButton.addEventListener('click', performReplacement);
        clearButton.addEventListener('click', clearResult);
        wordListTextArea.addEventListener('input', updateStats);
        themeToggleButton.addEventListener('click', toggleTheme);

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
        }

function parseWordList(listText) {
    const replacementMap = new Map();
    // 过滤掉空行，并对每一行进行处理
    const lines = listText.split('\n').map(line => line.trim()).filter(line => line);
    
    /**
     * 改进后的正则表达式：
     * ^\[\[        : 以 [[ 开头
     * ([\s\S]*?)   : 第一个捕获组（查找内容），[\s\S] 允许匹配包括换行符在内的所有字符
     * \]\]         : 匹配 ]] 
     * \s*\|\|\|\s* : 匹配中间的分隔符 |||，允许两边有空格
     * \[\[         : 匹配右侧开始的 [[
     * ([\s\S]*?)   : 第二个捕获组（替换内容）
     * \]\]$        : 以 ]] 结尾
     */
    const lineRegex = /^\[\[([\s\S]*?)\]\]\s*\|\|\|\s*\[\[([\s\S]*?)\]\]$/;

    for (const line of lines) {
        const match = line.match(lineRegex);
        if (match) {
            // match[1] 是查找内容, match[2] 是替换内容
            const findTerm = match[1]; // 不建议 .trim()，因为括号内部的空格可能是用户刻意保留的
            const replaceTerm = match[2];
            
            if (findTerm) {
                replacementMap.set(findTerm, replaceTerm);
            }
        }
    }
    return { map: replacementMap, totalLines: lines.length };
}
        
        function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

        function updateStats() {
            const parsedResult = parseWordList(wordListTextArea.value);
            document.getElementById('total-lines').textContent = parsedResult.totalLines;
            document.getElementById('parsed-pairs').textContent = parsedResult.map.size;
        }

        function performReplacement() {
            const originalText = document.getElementById('original-text').value;
            const resultTextArea = document.getElementById('result-text');
            updateStats();
            const parsedResult = parseWordList(wordListTextArea.value);
            const replacementMap = parsedResult.map;
            const totalRules = replacementMap.size;
            if (totalRules === 0) {
                resultTextArea.value = originalText;
                alert("词表中没有解析到有效的替换项，未进行任何替换。");
                return;
            }
            let replacementCount = 0;
            const foundKeys = new Set();
            const findTermsRegex = new RegExp(Array.from(replacementMap.keys()).map(escapeRegex).join('|'), 'g');
            const resultText = originalText.replace(findTermsRegex, (match) => {
                replacementCount++;
                foundKeys.add(match);
                return replacementMap.get(match);
            });
            resultTextArea.value = resultText;
            
            // **** 代码修改开始 ****

            // 1. 找出所有未被使用的规则
            const unusedKeys = Array.from(replacementMap.keys()).filter(key => !foundKeys.has(key));
            const unusedRulesCount = unusedKeys.length;

            // 2. 构建基础的提示信息
            let statsMessage = `替换完成！\n\n- 规则数 (有效解析): ${totalRules} 条\n- 找到数 (成功替换): ${replacementCount} 次\n- 未找到数 (未匹配规则): ${unusedRulesCount} 条`;

            // 3. 如果有未匹配的规则，则将前10条加入到提示信息中
            if (unusedRulesCount > 0) {
                const topUnused = unusedKeys.slice(0, 10);
                statsMessage += `\n\n- 以下是最多10条未匹配到的内容:\n`;
                statsMessage += topUnused.map(key => `  - "${key}"`).join('\n');
            }

            // 4. 显示最终的提示信息
            alert(statsMessage);

            // **** 代码修改结束 ****
        }

        function clearResult() { document.getElementById('result-text').value = ''; }

        // 页面加载时应用保存的主题
        (function applySavedTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
            updateStats();
        })();

    </script>
</body>
</html>
