version: '3.8'
services:
  starlight:
    image: node:20.18.1-alpine3.20 # 锁定具体的 Node 和 Alpine 版本
    container_name: tipitaka-dev
    working_dir: /app
    # 极速挂载宿主机的代码目录到容器内
    volumes:
      - .:/app
    # 映射 Astro 默认的开发服务器端口
    ports:
      - "4321:4321"  # 给 npm run dev 用
      - "4173:4173"  # 给 npm run preview 用 (Astro 默认预览端口)
    # 启动时确保依赖安装（应对你以后新增依赖的情况），并启动开发服务器
    # 注意：--host 0.0.0.0 是必须的，否则 Docker 容器内的服务无法被 Mac 宿主机访问
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      # 本地开发时默认的环境变量
      - NODE_ENV=development
      - DEPLOY_ENV=domain # 可在此切换 'github' 或 'domain' 以测试不同基础路径
